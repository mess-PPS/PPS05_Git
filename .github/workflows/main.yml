name: Gitleaks Security Scan

on:
  push:
    branches:
      - main

jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Ejecutar Gitleaks
        run: |
          docker run --rm -v ${{ github.workspace }}:/path zricethezav/gitleaks detect --source="/path" --verbose